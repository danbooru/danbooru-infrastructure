# Collects push-based metrics.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: signoz
  labels:
    app: otel-collector

spec:
  replicas: 1

  selector:
    matchLabels:
      app: otel-collector

  template:
    metadata:
      labels:
        app: otel-collector

    spec:
      initContainers:
      - name: check-sync-migrations
        image: signoz/signoz-otel-collector:v0.144.2
        imagePullPolicy: Always
        command: ["/signoz-otel-collector"]
        args: ["migrate", "sync", "check"]
        env:
        - name: SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN
          value: "tcp://clickhouse.signoz.svc.cluster.local:9000"
        - name: SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION
          value: "false"
        - name: SIGNOZ_OTEL_COLLECTOR_TIMEOUT
          value: "10m"

      containers:
      - name: otel-collector
        image: signoz/signoz-otel-collector:v0.144.2
        imagePullPolicy: Always
        args:
        - "--config=/etc/otel-collector/config.yaml"
        - "--manager-config=/etc/otel-collector/manager-config.yaml"
        - "--copy-path=/var/tmp/collector-config.yaml"

        ports:
        - containerPort: 4317
        - containerPort: 4318
        - containerPort: 8888
        - containerPort: 13133
        - containerPort: 55679

        env:
        - name: LOW_CARDINAL_EXCEPTION_GROUPING
          value: "true"

        volumeMounts:
        - name: otel-collector-config
          mountPath: /etc/otel-collector
          readOnly: true

        readinessProbe:
          httpGet:
            path: "/"
            port: 13133
          periodSeconds: 3
          timeoutSeconds: 3
          failureThreshold: 5
          initialDelaySeconds: 3

        livenessProbe:
          httpGet:
            path: "/"
            port: 13133
          periodSeconds: 15
          timeoutSeconds: 3
          failureThreshold: 4
          initialDelaySeconds: 3

      volumes:
      - name: otel-collector-config
        configMap:
          name: otel-collector-config

---

apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: signoz
  labels:
    app: otel-collector
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc-receiver
      port: 4317
    - name: otlp-http-receiver
      port: 4318
    - name: internal-metrics
      port: 8888
    - name: healthcheck
      port: 13133
    - name: zpages
      port: 55679
