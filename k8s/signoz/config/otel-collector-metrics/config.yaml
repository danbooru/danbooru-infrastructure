extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  zpages:
    endpoint: 0.0.0.0:55679

exporters:
  signozclickhousemetrics:
    dsn: tcp://clickhouse.signoz.svc.cluster.local:9000/signoz_metrics
  metadataexporter:
    cache:
      provider: in_memory
    dsn: tcp://clickhouse.signoz.svc.cluster.local:9000/signoz_metadata
    enabled: true
    timeout: 45s
  debug:
    verbosity: basic # normal, detailed
  prometheus/debug:
    endpoint: 0.0.0.0:9101
    resource_to_telemetry_conversion: { enabled: true }

service:
  telemetry:
    logs:
      encoding: json
      # level: DEBUG
  extensions:
    - health_check
    - zpages
  pipelines:
    metrics/k8s_cluster:
      receivers: [k8s_cluster]
      processors: [k8sattributes]
      exporters: [signozclickhousemetrics, metadataexporter, debug]
    metrics:
      receivers: [redis, prometheus/postgres, prometheus/otel-collector-metrics]
      processors: [memory_limiter, batch]
      exporters: [signozclickhousemetrics, metadataexporter, debug]
    metrics/cloudflare:
      receivers: [prometheus/cloudflare]
      processors: [memory_limiter, metricstransform/cloudflare, batch]
      exporters: [signozclickhousemetrics, metadataexporter, debug]
    metrics/node:
      receivers: [prometheus/node]
      processors: [memory_limiter, metricstransform/node, batch]
      exporters: [signozclickhousemetrics, metadataexporter, debug]
    metrics/clickhouse:
      receivers: [prometheus/clickhouse]
      processors: [memory_limiter, filter/clickhouse, batch]
      exporters: [signozclickhousemetrics, metadataexporter, debug]
    metrics/squid:
      receivers: [prometheus/squid]
