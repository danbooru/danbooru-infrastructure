apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: signoz
  namespace: signoz
spec:
  template:
    spec:
      nodeName: mori

      volumes:
      - name: signoz-data
        hostPath:
          path: /srv/signoz/signoz
      - name: signoz-dashboards
        hostPath:
          path: /srv/signoz/signoz-dashboards
