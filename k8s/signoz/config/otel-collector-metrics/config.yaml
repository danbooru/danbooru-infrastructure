# Collects pull-based metrics.

receivers:
  otlp:
    protocols:
      grpc:
      http:

  redis:
    endpoint: "redis-svc.danbooru.svc.cluster.local:6379"
    collection_interval: 60s

  k8s_cluster:
    collection_interval: 60s
    node_conditions_to_report: [Ready, DiskPressure, MemoryPressure, PIDPressure, NetworkUnavailable]
    allocatable_types_to_report: [cpu, memory, ephemeral-storage]
    distribution: kubernetes
    metrics:
      k8s.node.condition: { enabled: true }
      k8s.pod.status_reason: { enabled: true }

  prometheus/otel-collector-metrics:
    config:
      scrape_configs:
        # otel-collector-metrics internal metrics
        - job_name: otel-collector-metrics
          scrape_interval: 60s
          static_configs:
            - targets:
                - localhost:8888
              labels:
                job_name: otel-collector-metrics
#        # SigNoz span metrics
#        - job_name: signozspanmetrics-collector
#          scrape_interval: 60s
#          static_configs:
#            - targets:
#              - otel-collector.signoz.svc.cluster.local:8889

  prometheus/cloudflare:
    config:
      scrape_configs:
      - job_name: cloudflare-metrics
        scrape_interval: 60s
        static_configs:
        - targets:
          - cloudflare-exporter.signoz.svc.cluster.local:8080
          labels:
            job_name: cloudflare-metrics
        metric_relabel_configs:
        - source_labels: [__name__]
          regex: "^go_.*|^promhttp_.*|^process_.*"
          action: drop

  prometheus/postgres:
    config:
      scrape_configs:
      - job_name: postgres-metrics
        scrape_interval: 60s
        static_configs:
        - targets:
          - postgres-exporter.signoz.svc.cluster.local:9187
          labels:
            job_name: postgres-metrics
        metric_relabel_configs:
        - source_labels: [__name__]
          regex: "^go_.*|^promhttp_.*|^process_.*(max|fds).*|^pg_exporter.*|^pg_scrape.*|^postgres_exporter.*|^pg_stat_bgwriter_.*_total|^pg_roles_.*|^pg_stat_user_tables_.*(analyze|vacuum).*"
          action: drop

  prometheus/clickhouse:
    config:
      scrape_configs:
      - job_name: clickhouse-metrics
        scrape_interval: 60s
        static_configs:
        - targets:
          - clickhouse.signoz.svc.cluster.local:9363
          labels:
            job_name: clickhouse-metrics

  prometheus/squid:
    config:
      scrape_configs:
      - job_name: squid-metrics
        scrape_interval: 60s
        static_configs:
        - targets:
          - squid-exporter.signoz.svc.cluster.local:9301
          labels:
            job_name: squid-metrics

  prometheus/cert-manager:
    config:
      scrape_configs:
      - job_name: cert-manager-metrics
        scrape_interval: 60s
        static_configs:
        - targets:
          - cert-manager.cert-manager.svc.cluster.local:9402
          labels:
            job_name: cert-manager-metrics

  prometheus/kube-state-metrics:
    config:
      scrape_configs:
      - job_name: kube-state-metrics
        scrape_interval: 60s
        static_configs:
        - targets:
          - kube-state-metrics.signoz.svc.cluster.local:8080
          labels:
            job_name: kube-state-metrics

  # curl -s http://172.16.0.x:10251/metrics
  prometheus/kube-scheduler:
    config:
      scrape_configs:
      - job_name: kube-scheduler-metrics
        scrape_interval: 60s

        kubernetes_sd_configs:
        - role: node

        # Scrape control plane nodes on port 10251 (http://172.16.0.x:10251/metrics)
        relabel_configs:
        - action: keep
          source_labels: [__meta_kubernetes_node_label_node_role_kubernetes_io_controlplane]
          regex: "true"
        - target_label: __address__
          source_labels: [__meta_kubernetes_node_address_InternalIP]
          replacement: "$1:10252"
        - target_label: job_name
          source_labels: [__meta_kubernetes_node_name]
          replacement: kube-scheduler-metrics
        - target_label: node
          source_labels: [__meta_kubernetes_node_name]

        metric_relabel_configs:
        - source_labels: [__name__, le]
          regex: '.*_bucket;[0-9].*'
          action: drop

  # curl -s http://172.16.0.x:10252/metrics
  prometheus/kube-controller-manager:
    config:
      scrape_configs:
      - job_name: kube-controller-manager-metrics
        scrape_interval: 60s

        kubernetes_sd_configs:
        - role: node

        # Scrape control plane nodes on port 10252 (http://172.16.0.x:10252/metrics)
        relabel_configs:
        - action: keep
          source_labels: [__meta_kubernetes_node_label_node_role_kubernetes_io_controlplane]
          regex: "true"
        - target_label: __address__
          source_labels: [__meta_kubernetes_node_address_InternalIP]
          replacement: "$1:10252"
        - target_label: job_name
          source_labels: [__meta_kubernetes_node_name]
          replacement: kube-controller-manager-metrics
        - target_label: node
          source_labels: [__meta_kubernetes_node_name]

        metric_relabel_configs:
        - source_labels: [__name__, le]
          regex: '.*_bucket;[0-9].*'
          action: drop

  # TOKEN=$(kubectl get secret otel-collector-metrics-token-j9cx8 -n signoz -o jsonpath='{.data.token}' | base64 -d)
  # curl -sk -H "Authorization: Bearer $TOKEN" https://172.16.0.x:6443/metrics
  prometheus/kube-apiserver:
    config:
      scrape_configs:
      - job_name: kube-apiserver-metrics
        scrape_interval: 60s

        kubernetes_sd_configs:
        - role: node

        # Scrape control plane nodes on port 6443 (https://172.16.0.x:6443/metrics)
        relabel_configs:
        - action: keep
          source_labels: [__meta_kubernetes_node_label_node_role_kubernetes_io_controlplane]
          regex: "true"
        - target_label: __address__
          source_labels: [__meta_kubernetes_node_address_InternalIP]
          replacement: "$1:6443"
        - target_label: job_name
          source_labels: [__meta_kubernetes_node_name]
          replacement: kube-apiserver-metrics
        - target_label: node
          source_labels: [__meta_kubernetes_node_name]

        metric_relabel_configs:
        - source_labels: [__name__, le]
          regex: '.*_bucket;[0-9].*'
          action: drop

        scheme: https
        authorization:
          credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true

  # curl -sk -H "Authorization: Bearer $TOKEN" https://172.16.0.x:10250/metrics/cadvisor
  prometheus/cadvisor:
    config:
      scrape_configs:
      - job_name: cadvisor-metrics
        scrape_interval: 60s

        metrics_path: /metrics/cadvisor

        kubernetes_sd_configs:
        - role: node

        relabel_configs:
        - target_label: __address__
          source_labels: [__meta_kubernetes_node_address_InternalIP]
          replacement: "$1:10250"
        - target_label: job_name
          source_labels: [__meta_kubernetes_node_name]
          replacement: cadvisor-metrics
        - target_label: node
          source_labels: [__meta_kubernetes_node_name]

        scheme: https
        authorization:
          credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true

  # curl -sk -H "Authorization: Bearer $TOKEN" https://172.16.0.x:10250/metrics
  prometheus/kubelet:
    config:
      scrape_configs:
      - job_name: kubelet-metrics
        scrape_interval: 60s

        kubernetes_sd_configs:
        - role: node

        relabel_configs:
        - target_label: job_name
          source_labels: [__meta_kubernetes_node_name]
          replacement: kubelet-metrics
        - target_label: node
          source_labels: [__meta_kubernetes_node_name]

        scheme: https
        authorization:
          credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true

  # curl -s http://172.16.0.x:10254/metrics
  prometheus/nginx-ingress:
    config:
      scrape_configs:
      - job_name: nginx-ingress-metrics
        scrape_interval: 60s

        kubernetes_sd_configs:
        - role: node

        # Scrape control plane nodes on port 10254 (http://172.16.0.x:10254/metrics)
        relabel_configs:
        - target_label: __address__
          source_labels: [__meta_kubernetes_node_address_InternalIP]
          replacement: "$1:10254"
        - target_label: job_name
          source_labels: [__meta_kubernetes_node_name]
          replacement: nginx-ingress-metrics
        - target_label: node
          source_labels: [__meta_kubernetes_node_name]

        metric_relabel_configs:
        - source_labels: [__name__, le]
          regex: 'nginx_ingress_controller_(request|response)_(size|duration_seconds)_bucket;[0-9].*'
          action: drop

  # curl -s http://danbooru.danbooru.svc.cluster.local:3000/metrics/instance
  prometheus/danbooru-instance:
    config:
      scrape_configs:
      - job_name: danbooru-instance-metrics
        scrape_interval: 60s

        kubernetes_sd_configs:
        - role: pod

        metrics_path: /metrics/instance

        relabel_configs:
        - action: keep
          source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_pod_container_name, __meta_kubernetes_pod_label_app]
          regex: danbooru;danbooru;(danbooru|betabooru|safebooru|danbooru-cron|danbooru-jobs)
        - target_label: job_name
          source_labels: [__meta_kubernetes_pod_name]
          replacement: danbooru-instance-metrics
        - target_label: pod
          source_labels: [__meta_kubernetes_pod_name]
        - target_label: node
          source_labels: [__meta_kubernetes_pod_node_name]
        - target_label: app
          source_labels: [__meta_kubernetes_pod_label_app]

  # curl -sk http://172.16.0.x:9100/metrics
  prometheus/node:
    config:
      scrape_configs:
      - job_name: node-metrics
        scrape_interval: 60s

        kubernetes_sd_configs:
        - role: endpoints

        relabel_configs:
        - action: keep
          source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_endpoints_name]
          regex: signoz;node-exporter
        - target_label: job_name
          source_labels: [__meta_kubernetes_endpoint_node_name]
          replacement: node-metrics
        - target_label: node
          source_labels: [__meta_kubernetes_endpoint_node_name]

        metric_relabel_configs:
        - source_labels: [__name__]
          regex: "^node_(cooling|cpu_guest|cpu_core_throttle|cpu_frequency_(max|min)|cpu_scaling_frequency_(max|min)|disk_info|exporter|filesystem_(device_error|free_bytes|readonly)|hwmon_(power|chip|sensor)|hwmon_temp_(min|max|crit|alarm)|netstat_(Icmp|Udp)|scrape|network_(up|carrier|address|device|dormant|flags|iface|info|mtu|name|net|protocol|speed)|sockstat_(FRAG|RAW|UDP)|zfs_(abd|arc_(arc|abd|access|anon|l2|hash|evict)|zil_zil_itx|vdev|fm|dnode|dmu|zpool_(state|dataset))).*"
          action: drop

processors:
  batch:
    send_batch_size: 10000
    send_batch_max_size: 11000
    timeout: 10s

  memory_limiter:
    limit_mib: 2048 # 2GB
    spike_limit_mib: 512
    check_interval: 1s

  k8sattributes:
    extract:
      metadata:
      - k8s.namespace.name
      - k8s.deployment.name
      - k8s.statefulset.name
      - k8s.daemonset.name
      - k8s.cronjob.name
      - k8s.job.name
      - k8s.node.name
      - k8s.node.uid
      - k8s.pod.name
      - k8s.pod.uid
      - k8s.pod.start_time
      - k8s.container.name
    passthrough: false
    pod_association:
    - sources:
      - from: resource_attribute
        name: k8s.pod.ip
    - sources:
      - from: resource_attribute
        name: k8s.pod.uid
    - sources:
      - from: connection

  # Drop `country` label from certain metrics and reaggregate samples.
  metricstransform/cloudflare:
    transforms:
    - include: cloudflare_zone_requests_status_country_host|cloudflare_zone_firewall_events_count
      match_type: regexp
      action: update
      operations:
      - action: aggregate_labels
        label_set: ["action", "host", "source", "zone", "status"] # drop country label
        aggregation_type: sum

  metricstransform/node:
    transforms:
    # drop `cpu` label; sum cpus by mode
    - include: node_cpu_seconds_total
      match_type: regexp
      action: update
      operations:
      - action: aggregate_labels
        label_set: ["mode", "node"] # drop `cpu`
        aggregation_type: sum

    # drop `cpu` label; average frequencies
    - include: node_cpu_scaling_frequency_hertz
      match_type: regexp
      action: update
      operations:
      - action: aggregate_labels
        label_set: ["node"] # drop `cpu`
        aggregation_type: mean

    # drop `sensor` label; max temperatures by chip
    - include: node_hwmon_temp_celsius
      match_type: regexp
      action: update
      operations:
      - action: aggregate_labels
        label_set: ["chip", "node"] # drop `sensor`
        aggregation_type: max

  attributes/kube-state-metrics:
    include:
      match_type: regexp
      metric_names:
        - kube_pod
    actions:
      - key: pod
        action: extract
        pattern: "^(?P<pod_owner>.*?)(?:-[a-f0-9]{8,10})?(?:-[a-z0-9]{5})?$"

  metricstransform/kube-state-metrics:
    transforms:
    - include: kube_configmap_info
      new_name: kube_configmap_count
      action: update
      operations:
      - action: aggregate_labels
        label_set: []
        aggregation_type: sum

    - include: kube_endpoint_address
      new_name: kube_endpoint_count
      action: update
      operations:
      - action: aggregate_labels
        label_set: [ready]
        aggregation_type: sum

    - include: kube_replicaset_owner
      new_name: kube_replicaset_count
      action: update
      operations:
      - action: aggregate_labels
        label_set: []
        aggregation_type: sum

    - include: kube_secret_type
      new_name: kube_secret_count
      action: update
      operations:
      - action: aggregate_labels
        label_set: [type]
        aggregation_type: sum

    - include: kube_service_spec_type
      new_name: kube_service_count
      action: update
      operations:
      - action: aggregate_labels
        label_set: [type]
        aggregation_type: sum

    - include: kube_(node|deployment)_status_condition
      match_type: regexp
      action: update
      operations:
        - action: delete_label_value
          label: status
          label_value: "unknown"
        - action: delete_label_value
          label: status
          label_value: "false"

    - include: kube_deployment_status_condition
      new_name: kube_deployment_status_condition_count
      action: update
      operations:
      - action: aggregate_labels
        label_set: [condition]
        aggregation_type: sum

    - include: kube_deployment_spec_paused
      new_name: kube_deployment_spec_paused_count
      action: update
      operations:
      - action: aggregate_labels
        label_set: []
        aggregation_type: sum

    - include: kube_pod_container_status_restarts_total
      new_name: kube_pod_container_status_restarts_total_count
      action: update
      operations:
      - action: aggregate_labels
        label_set: [namespace, pod_owner, container]
        aggregation_type: sum

    - include: kube_pod_container_info
      new_name: kube_pod_container_info_count
      action: update
      operations:
      - action: aggregate_labels
        label_set: [container, image_spec, image_id, namespace, pod_owner]
        aggregation_type: sum

    - include: kube_pod_status_reason
      new_name: kube_pod_status_reason_count
      action: update
      operations:
      - action: aggregate_labels
        label_set: [reason]
        aggregation_type: sum

    - include: kube_pod_status_phase
      new_name: kube_pod_status_phase_count
      action: update
      operations:
      - action: aggregate_labels
        label_set: [phase]
        aggregation_type: sum

    - include: kube_pod_status_ready
      new_name: kube_pod_status_ready_count
      action: update
      operations:
      - action: aggregate_labels
        label_set: [condition]
        aggregation_type: sum

  filter/kube-state-metrics:
    metrics:
      include:
        match_type: strict
        metric_names:
           - kube_configmap_count
           - kube_daemonset_status_number_available
           - kube_daemonset_status_number_unavailable
           - kube_daemonset_status_observed_generation
           - kube_deployment_spec_paused_count
           - kube_deployment_status_condition_count
           - kube_deployment_status_observed_generation
           - kube_endpoint_count
           - kube_node_spec_unschedulable
           - kube_node_status_condition
           - kube_pod_container_info_count
           - kube_pod_container_status_restarts_total_count
           - kube_pod_info
           - kube_pod_status_phase_count
           - kube_pod_status_ready_count
           - kube_pod_status_reason_count
           - kube_replicaset_count
           - kube_secret_count
           - kube_service_count
           - kube_statefulset_status_observed_generation
           - scrape_duration_seconds
           - scrape_samples_scraped
           - scrape_series_added
           - up

  filter/cadvisor:
    metrics:
      include:
        match_type: strict
        metric_names:
          - cadvisor_version_info                              # A metric with a constant '1' value labeled by kernel version, OS version, docker version, cadvisor version & cadvisor revision.                                                                                                    13:38:05 [17/5404]
          # - container_cpu_cfs_periods_total                  # Number of elapsed enforcement period intervals.
          # - container_cpu_cfs_throttled_periods_total        # Number of throttled period intervals.
          # - container_cpu_cfs_throttled_seconds_total        # Total time duration the container has been throttled.
          # - container_cpu_load_average_10s                   # Value of container cpu load average over the last 10 seconds.
          # - container_cpu_system_seconds_total               # Cumulative system cpu time consumed in seconds.
          - container_cpu_usage_seconds_total                  # Cumulative cpu time consumed in seconds.
          # - container_cpu_user_seconds_total                 # Cumulative user cpu time consumed in seconds.
          - container_file_descriptors                         # Number of open file descriptors for the container.
          # - container_fs_inodes_free                         # Number of available Inodes
          # - container_fs_inodes_total                        # Number of Inodes
          - container_fs_io_current                            # Number of I/Os currently in progress
          - container_fs_io_time_seconds_total                 # Cumulative count of seconds spent doing I/Os
          # - container_fs_io_time_weighted_seconds_total      # Cumulative weighted I/O time in seconds
          # - container_fs_limit_bytes                         # Number of bytes that can be consumed by the container on this filesystem.
          - container_fs_read_seconds_total                    # Cumulative count of seconds spent reading
          - container_fs_reads_bytes_total                     # Cumulative count of bytes read
          # - container_fs_reads_merged_total                  # Cumulative count of reads merged
          - container_fs_reads_total                           # Cumulative count of reads completed
          # - container_fs_sector_reads_total                  # Cumulative count of sector reads completed
          # - container_fs_sector_writes_total                 # Cumulative count of sector writes completed
          - container_fs_usage_bytes                           # Number of bytes that are consumed by the container on this filesystem.
          - container_fs_write_seconds_total                   # Cumulative count of seconds spent writing
          - container_fs_writes_bytes_total                    # Cumulative count of bytes written
          # - container_fs_writes_merged_total                 # Cumulative count of writes merged
          - container_fs_writes_total                          # Cumulative count of writes completed
          - container_last_seen                                # Last time a container was seen by the exporter
          # - container_memory_cache                           # Number of bytes of page cache memory.
          # - container_memory_failcnt_total                   # Number of memory usage hits limits
          # - container_memory_failures_total                  # Cumulative count of memory allocation failures.
          # - container_memory_mapped_file                     # Size of memory mapped files in bytes.
          # - container_memory_max_usage_bytes                 # Maximum memory usage recorded in bytes
          - container_memory_rss                               # Size of RSS in bytes.
          # - container_memory_swap                            # Container swap usage in bytes.
          - container_memory_usage_bytes                       # Current memory usage in bytes, including all memory regardless of when it was accessed
          - container_memory_working_set_bytes                 # Current working set in bytes.
          - container_network_receive_bytes_total              # Cumulative count of bytes received
          # - container_network_receive_errors_total           # Cumulative count of errors encountered while receiving
          # - container_network_receive_packets_dropped_total  # Cumulative count of packets dropped while receiving
          - container_network_receive_packets_total            # Cumulative count of packets received
          - container_network_transmit_bytes_total             # Cumulative count of bytes transmitted
          # - container_network_transmit_errors_total          # Cumulative count of errors encountered while transmitting
          # - container_network_transmit_packets_dropped_total # Cumulative count of packets dropped while transmitting
          - container_network_transmit_packets_total           # Cumulative count of packets transmitted
          - container_processes                                # Number of processes running inside the container.
          # - container_scrape_error                           # 1 if there was an error while getting container metrics, 0 otherwise
          - container_sockets                                  # Number of open sockets for the container.
          # - container_spec_cpu_period                        # CPU period of the container.
          # - container_spec_cpu_quota                         # CPU quota of the container.
          # - container_spec_cpu_shares                        # CPU share of the container.
          # - container_spec_memory_limit_bytes                # Memory limit for the container.
          # - container_spec_memory_reservation_limit_bytes    # Memory reservation limit for the container.
          # - container_spec_memory_swap_limit_bytes           # Memory swap limit for the container.
          - container_start_time_seconds                       # Start time of the container since unix epoch in seconds.
          # - container_tasks_state                            # Number of tasks in given state
          - container_threads                                  # Number of threads running inside the container
          # - container_threads_max                            # Maximum number of threads allowed inside the container, infinity if value is zero
          # - container_ulimits_soft                           # Soft ulimit values for the container root process. Unlimited if -1, except priority and nice
          - machine_cpu_cores                                  # Number of logical CPU cores.
          # - machine_cpu_physical_cores                       # Number of physical CPU cores.
          # - machine_cpu_sockets                              # Number of CPU sockets.
          # - machine_dimm_capacity_bytes                      # Total RAM DIMM capacity (all types memory modules) value labeled by dimm type.
          # - machine_dimm_count                               # Number of RAM DIMM (all types memory modules) value labeled by dimm type.
          - machine_memory_bytes                               # Amount of memory installed on the machine.
          # - machine_nvm_avg_power_budget_watts               # NVM power budget.
          # - machine_nvm_capacity                             # NVM capacity value labeled by NVM mode (memory mode or app direct mode).
          - machine_scrape_error                               # 1 if there was an error while getting machine metrics, 0 otherwise.
          - scrape_duration_seconds                            # Duration of the scrape
          # - scrape_samples_post_metric_relabeling            # The number of samples remaining after metric relabeling was applied
          - scrape_samples_scraped                             # The number of samples the target exposed
          - scrape_series_added                                # The approximate number of new series in this scrape
          - target_info                                        # Target metadata
          - up                                                 # The scraping was successful

  filter/cert-manager:
    metrics:
      include:
        match_type: strict
        metric_names:
          - certmanager_certificate_expiration_timestamp_seconds
          - scrape_duration_seconds
          - scrape_samples_scraped
          - scrape_series_added
          - up

  filter/squid:
    metrics:
      include:
        match_type: strict
        metric_names:
          - process_cpu_seconds_total
          - process_resident_memory_bytes
          - squid_DNS_Lookups_50
          - squid_DNS_Lookups_95
          - squid_HTTP_Requests_All_50
          - squid_HTTP_Requests_All_95
          - squid_client_http_kbytes_in_kbytes_total
          - squid_client_http_kbytes_out_kbytes_total
          - squid_client_http_requests_total
          - squid_client_http_errors_total
          - squid_server_all_kbytes_in_kbytes_total
          - squid_server_all_kbytes_out_kbytes_total
          - squid_server_all_requests_total
          - squid_server_all_errors_total
          - squid_up
          - scrape_duration_seconds
          - scrape_samples_scraped
          - scrape_series_added
          - up

  metricstransform/kube-apiserver:
    transforms:
