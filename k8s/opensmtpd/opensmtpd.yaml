apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opensmtpd
  namespace: danbooru
  labels:
    app: opensmtpd

spec:
  replicas: 1
  serviceName: opensmtpd
  selector:
    matchLabels:
      app: opensmtpd

  updateStrategy:
    type: RollingUpdate

  template:
    metadata:
      labels:
        app: opensmtpd

    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      terminationGracePeriodSeconds: 90

      containers:
      - name: opensmtpd
        image: wodby/opensmtpd:7.8
        imagePullPolicy: Always
        args: ["smtpd", "-v", "-d", "-f", "/etc/opensmtpd/smtpd.conf"]

        ports:
        - containerPort: 587
        - containerPort: 465
        - containerPort: 25

        volumeMounts:
        - name: opensmtpd-config
          mountPath: /etc/opensmtpd
          readOnly: true
        - name: opensmtpd-certificate
          mountPath: /etc/opensmtpd/certificates
          readOnly: true
        - name: opensmtpd-data
          mountPath: /srv/opensmtpd
          mountPropagation: HostToContainer

        readinessProbe:
          exec:
            command: ["smtpctl", "show", "status"]
          periodSeconds: 15
          timeoutSeconds: 3
          failureThreshold: 2
          initialDelaySeconds: 3

      volumes:
      - name: opensmtpd-config
        configMap:
          name: opensmtpd-config
      - name: opensmtpd-certificate
        secret:
          secretName: donmai-us-tls
          defaultMode: 384 # 0600

---

apiVersion: v1
kind: Service
metadata:
  name: opensmtpd
  namespace: danbooru
  labels:
    app: opensmtpd
spec:
  selector:
    app: opensmtpd
  ports:
    - name: smtp
      port: 25
    - name: smtps
      port: 465
    - name: smtp-tls
      port: 587
