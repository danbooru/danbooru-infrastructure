apiVersion: apps/v1
kind: Deployment

metadata:
  name: danbooru-cron
  namespace: danbooru
  labels:
    app: danbooru-cron

spec:
  replicas: 1

  selector:
    matchLabels:
      app: danbooru-cron

  template:
    metadata:
      labels:
        app: danbooru-cron

    spec:
      hostname: danbooru-cron

      containers:
      - name: danbooru
        image: ghcr.io/danbooru/danbooru:production
        imagePullPolicy: Always

        args: ["bin/rails", "danbooru:cron"]

        ports:
        - containerPort: 3000
          name: danbooru

        env:
        - name: DANBOORU_METRICS_PORT
          value: "3000"

        envFrom:
        - configMapRef:
            name: danbooru-config-env
        - secretRef:
            name: danbooru-secret-env

        volumeMounts:
        - name: danbooru-local-config
          mountPath: "/etc/danbooru"
          readOnly: true

      volumes:
      - name: danbooru-local-config
        secret:
          secretName: danbooru-local-config

---

apiVersion: v1
kind: Service
metadata:
  name: danbooru-cron
  namespace: danbooru
spec:
  selector:
    app: danbooru-cron
  ports:
    - port: 3000
      targetPort: 3000
      name: danbooru
